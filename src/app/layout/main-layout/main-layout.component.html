<div class="page-layout">
  <!-- Header -->
  <div class="header-row">
    <app-header 
      (menuIconClicked)="onMenuIconClicked()"
      (userIconClicked)="onUserIconClicked()">
    </app-header>
  </div>

  <!-- Menu + Body -->
  <div class="content-row">
    <div class="sidebar" [class.sidebar--collapsed]="isSidebarCollapsed()">
      <app-sidebar
        [items]="rawMenuItems"
        [showSearch]="true"
        searchPlaceholder="Cerca nel menu..."
        [isCollapsed]="isSidebarCollapsed()"
        (itemClick)="onMenuItemClick($event)"
        (breadcrumbChanged)="onBreadcrumbChanged($event)">
      </app-sidebar>
    </div>

    <main class="main-content">
      <!-- Titolo pagina — allineato con il breadcrumb -->
      @if (pageTitle()) {
        <div class="page-title-row">
          <h1 class="page-title">{{ pageTitle() }}</h1>
        </div>
      }

      <!-- Breadcrumb -->
      <div class="breadcrumb-row">
        <app-breadcrumb
          [items]="breadcrumbItems()"
          [isDarkTheme]="isDarkTheme"
          (itemClick)="onBreadcrumbItemClick($event)">
        </app-breadcrumb>
      </div>

      <!-- Contenuto pagina -->
      <div class="content-area">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
