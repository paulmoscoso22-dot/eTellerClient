<div class="container">
  <h1>Gestione Regole</h1>

  <!-- Search Form -->
  <app-gestione-regole-filter
    [isLoading]="isLoading()"
    (searchEvent)="onSearch($event)"
    (resetEvent)="onReset()"
  ></app-gestione-regole-filter>

  <app-gestione-regole-table
    [rules]="rules()"
    [isLoading]="isLoading()"
    [error]="error()"
  ></app-gestione-regole-table>
</div>
