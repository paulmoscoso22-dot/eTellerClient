<div class="page-wrapper" [formGroup]="searchForm">

  <section class="card-section">
    <h2 class="section-title">Filtri di Selezione</h2>

    <div class="fields-grid fields-grid--4">

      <div class="field-group">
        <label class="field-label">Cassa</label>
        <dx-text-box
          formControlName="tocCliId"
          placeholder="Codice Cassa">
        </dx-text-box>
      </div>

      <div class="field-group">
        <label class="field-label">Data</label>
        <dx-date-box
          formControlName="tocData"
          type="date"
          displayFormat="dd/MM/yyyy">
        </dx-date-box>
      </div>

      <div class="field-group">
        <label class="field-label">Tipo Conto</label>
        <dx-text-box
          formControlName="tocCutId"
          placeholder="Tipo conto">
        </dx-text-box>
      </div>

      <div class="field-group">
        <label class="field-label">Località</label>
        <dx-text-box
          formControlName="tocBraId"
          placeholder="Filiale">
        </dx-text-box>
      </div>

    </div>
  </section>

  <div class="action-bar">
    <dx-button
      text="Annulla"
      icon="remove"
      stylingMode="outlined"
      (onClick)="reset()">
    </dx-button>

    <dx-button
      text="Ricerca"
      type="success"
      icon="search"
      class="btn-search"
      [disabled]="isLoading()"
      (onClick)="search()">
    </dx-button>
  </div>

</div>
