<div class="search-form" [formGroup]="searchForm">
  <div class="form-row">
    @if (showCassa) {
      <div class="form-group">
        <dx-text-box
          id="trxCassa"
          formControlName="trxCassa"
          placeholder="Codice Cassa"
          label="Cassa"
        ></dx-text-box>
      </div>
    }

    @if (showBranch) {
      <div class="form-group">
        <dx-text-box
          id="trxBraId"
          formControlName="trxBraId"
          placeholder="Codice Filiale"
          label="Filiale"
        ></dx-text-box>
      </div>
    }

    @if (showStatus) {
      <div class="form-group">
        <dx-number-box
          id="trxStatus"
          formControlName="trxStatus"
          placeholder="Status"
          label="Status"
          [readOnly]="statusReadOnly"
        ></dx-number-box>
      </div>
    }
  </div>

  <div class="form-row">
    <div class="form-group">
      <dx-date-box
        id="trxDataDal"
        formControlName="trxDataDal"
        type="date"
        label="Data Dal"
        format="dd/MM/yyyy"
        displayFormat="dd/MM/yyyy"
        (onValueChanged)="onDateDalChanged($event)"
      ></dx-date-box>
    </div>

    <div class="form-group">
      <dx-date-box
        id="trxDataAl"
        formControlName="trxDataAl"
        type="date"
        label="Data Al"
        format="dd/MM/yyyy"
        displayFormat="dd/MM/yyyy"
        (onValueChanged)="onDateAlChanged($event)"
      ></dx-date-box>
    </div>
  </div>

  <div class="form-group button-group">
    <dx-button
      text="Ricerca"
      type="success"
      (onClick)="search()"
      [disabled]="isLoading()"
    ></dx-button>
  </div>
</div>
