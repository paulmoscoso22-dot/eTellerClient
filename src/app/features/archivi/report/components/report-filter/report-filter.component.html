<div class="page-wrapper" [formGroup]="searchForm">

  <section class="card-section">
    <h2 class="section-title">Filtri di Selezione</h2>

    <div class="fields-grid fields-grid--3">

      @if (showCassa) {
        <div class="field-group">
          <label class="field-label">Cassa</label>
          <dx-text-box
            formControlName="trxCassa"
            placeholder="Codice Cassa">
          </dx-text-box>
        </div>
      }

      @if (showBranch) {
        <div class="field-group">
          <label class="field-label">Filiale</label>
          <dx-text-box
            formControlName="trxBraId"
            placeholder="Codice Filiale">
          </dx-text-box>
        </div>
      }

      @if (showStatus) {
        <div class="field-group">
          <label class="field-label">Status</label>
          @if (statusReadOnly) {
            <div class="status-badge" [ngClass]="'status-badge--' + statusDefaultValue">
              {{ statusDefaultValue }}
            </div>
          } @else {
            <dx-number-box formControlName="trxStatus"></dx-number-box>
          }
        </div>
      }

      <div class="field-group">
        <label class="field-label">Data Dal</label>
        <dx-date-box
          formControlName="trxDataDal"
          type="date"
          displayFormat="dd/MM/yyyy"
          (onValueChanged)="onDateDalChanged($event)">
        </dx-date-box>
      </div>

      <div class="field-group">
        <label class="field-label">Data Al</label>
        <dx-date-box
          formControlName="trxDataAl"
          type="date"
          displayFormat="dd/MM/yyyy"
          (onValueChanged)="onDateAlChanged($event)">
        </dx-date-box>
      </div>

    </div>
  </section>

  <div class="action-bar">
    <dx-button
      text="Annulla"
      icon="remove"
      stylingMode="outlined"
      (onClick)="reset()">
    </dx-button>

    <dx-button
      text="Ricerca"
      type="success"
      icon="search"
      class="btn-search"
      [disabled]="isLoading()"
      (onClick)="search()">
    </dx-button>
  </div>

</div>
