<div class="container">
  <!-- Search Form -->
  <app-report-filter
    [isLoading]="isLoading"
    [statusDefaultValue]="statusDefaultValue"
    [statusReadOnly]="true"
    [dataDalRequired]="true"
    [dataAlRequired]="true"
    (searchClick)="onSearch($event)"
  ></app-report-filter>

  <!-- Grid Component -->
  <app-operazioni-annullate-grid
    [transactions]="transactions"
    [isLoading]="isLoading"
    [error]="error"
  ></app-operazioni-annullate-grid>
</div>
