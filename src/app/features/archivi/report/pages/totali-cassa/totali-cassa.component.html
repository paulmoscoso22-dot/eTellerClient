<div class="container">
  <h1>Totali di Cassa</h1>

  <!-- Search Form -->
  <app-totale-cassa-filter
    [isLoading]="isLoading"
    [cassaRequired]="true"
    [dataRequired]="true"
    [tipContoRequired]="true"
    [localitaRequired]="true"
    (searchClick)="onSearch($event)"
  ></app-totale-cassa-filter>

  <!-- Error Message -->
  @if (error()) {
    <div class="error-message">
      {{ error() }}
    </div>
  }

  <!-- Loading Indicator -->
  @if (isLoading()) {
    <div class="loading-message">
      Caricamento...
    </div>
  }

  <!-- Data Grid -->
  @if (!isLoading() && totaliCassa().length > 0) {
    <div class="data-grid-container">
      <dx-data-grid
        id="gridContainer"
        [dataSource]="totaliCassa()"
        keyExpr="tocCurId"
        [showBorders]="true"
        [columnAutoWidth]="true"
        [allowColumnReordering]="true"
        [allowColumnResizing]="true"
      >
        <dxo-data-grid-filter-row
          [visible]="showFilterRow"
          [applyFilter]="currentFilter"
        ></dxo-data-grid-filter-row>
        <dxo-data-grid-header-filter
          [visible]="showHeaderFilter"
        ></dxo-data-grid-header-filter>
        <dxo-data-grid-search-panel
          [visible]="true"
          [width]="240"
          placeholder="Cerca..."
        ></dxo-data-grid-search-panel>
        <dxo-data-grid-paging [pageSize]="10" [enabled]="true"></dxo-data-grid-paging>
        <dxo-data-grid-pager
          [visible]="true"
          [showPageSizeSelector]="true"
          [allowedPageSizes]="[10, 25, 50, 100]"
          [showInfo]="true"
        ></dxo-data-grid-pager>
        
        <dxi-data-grid-column dataField="tocCurId" caption="Unità"></dxi-data-grid-column>
        <dxi-data-grid-column dataField="tocSaldoIni" caption="Saldo iniziale" dataType="number" format="#,##0.00" alignment="left"></dxi-data-grid-column>
        <dxi-data-grid-column dataField="tocTotdare" caption="Dare" dataType="number" format="#,##0.00" alignment="left"></dxi-data-grid-column>
        <dxi-data-grid-column dataField="tocTotdareCtv" caption="Dare CTV" dataType="number" format="#,##0.00" alignment="left"></dxi-data-grid-column>
        <dxi-data-grid-column dataField="tocTotavere" caption="Avere" dataType="number" format="#,##0.00" alignment="left"></dxi-data-grid-column>
        <dxi-data-grid-column dataField="tocSaldoFin" caption="Saldo finale" dataType="number" format="#,##0.00" alignment="left"></dxi-data-grid-column>
      </dx-data-grid>
    </div>
  }

  <!-- No Data Message -->
  @if (!isLoading() && totaliCassa().length === 0 && !error()) {
    <div class="no-data-message">
      Nessun dato trovato. Effettuare una ricerca.
    </div>
  }
</div>
