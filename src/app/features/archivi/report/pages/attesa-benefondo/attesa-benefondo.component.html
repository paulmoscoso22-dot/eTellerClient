<div class="container">
  <h1>Attesa Benefondo</h1>

  <!-- Search Form -->
  <app-report-filter
    [isLoading]="isLoading"
    [statusDefaultValue]="statusDefaultValue"
    [statusReadOnly]="true"
    [dataDalRequired]="true"
    [dataAlRequired]="true"
    (searchClick)="onSearch($event)"
  ></app-report-filter>

  <!-- Grid Component -->
  <app-attesa-benefondo-grid
    [transactions]="transactions"
    [isLoading]="isLoading"
    [error]="error"
  ></app-attesa-benefondo-grid>
</div>
