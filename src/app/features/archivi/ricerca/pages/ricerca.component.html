<div class="container">
  <h1>Ricerca Transazioni - Antiriciclaggio</h1>

  <app-ricerca-filter
    [currencies]="currencies"
    [branches]="branches"
    [currencyTypes]="currencyTypes"
    [stOperationsTypes]="stOperationsTypes"
    [isLoading]="isLoading"
    (searchClick)="onSearch($event)"
  ></app-ricerca-filter>

  <app-ricerca-grid
    [transactions]="transactions"
    [isLoading]="isLoading"
    [error]="error"
  ></app-ricerca-grid>
</div>
