<div class="page-shell">

  <!-- ══ Two-column grid ══ -->
  <div class="two-col-grid">

    <!-- ── Left column: Elenco + Dettaglio ── -->
    <div class="col-main">

      <!-- Card: Elenco Funzioni -->
      <section class="card-section card-fill">
        <app-header-card title="Funzioni di Sistema" [count]="sysFunctions().length">
          <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line>
            <line x1="3" y1="12" x2="3.01" y2="12"></line>
            <line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
        </app-header-card>
        <div class="card-body card-body--grid">
          <app-table-funzioni
            [dataSource]="sysFunctions()"
            [pageSize]="12"
            (selectionChanged)="onFunctionSelect($event)">
          </app-table-funzioni>
        </div>
      </section>

      <!-- Card: Dettaglio Funzione -->
      <section class="card-section">
        <app-header-card title="Dettaglio Funzione" [count]="selectedFunId() ? 'ID ' + selectedFunId() : null">
          <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"></path>
          </svg>
        </app-header-card>
        <div class="card-body">

          <div class="form-row">
            <label class="form-lbl">Nome</label>
            <div class="form-fld">
              <dx-text-box
                [value]="selectedFunName()"
                (onValueChanged)="selectedFunName.set($event.value)">
              </dx-text-box>
            </div>
          </div>

          <div class="form-row">
            <label class="form-lbl">Host Code</label>
            <div class="form-fld">
              <dx-number-box
                [value]="selectedFunHostcode()"
                (onValueChanged)="selectedFunHostcode.set($event.value)">
              </dx-number-box>
            </div>
          </div>

          <div class="form-row">
            <span class="form-lbl"></span>
            <div class="form-fld">
              <dx-check-box
                [value]="selectedOffline()"
                (onValueChanged)="selectedOffline.set($event.value)"
                text="Disponibile in modalità offline">
              </dx-check-box>
            </div>
          </div>

          <div class="form-row form-row--top">
            <label class="form-lbl">Descrizione</label>
            <div class="form-fld">
              <dx-text-area
                [value]="selectedFunDescription()"
                (onValueChanged)="selectedFunDescription.set($event.value)"
                [height]="66">
              </dx-text-area>
            </div>
          </div>

        </div>
      </section>

    </div>

    <!-- ── Right column: Ruoli + Utenti ── -->
    <div class="col-side">

      <!-- Card: Ruoli che utilizzano -->
      <section class="card-section">
        <app-header-card title="Ruoli che utilizzano">
          <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
        </app-header-card>
        <div class="card-body card-body--grid">
          <app-table-roles
            [dataSource]="sysRoles()"
            [pageSize]="5"
            (selectionChanged)="onRoleSelect($event)">
          </app-table-roles>
        </div>
      </section>

      <!-- Card: Utenti associati -->
      <section class="card-section card-fill">
        <app-header-card title="Utenti associati">
          <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        </app-header-card>
        <div class="card-body card-body--grid">
          <app-table-user-role
            [dataSource]="usersRoleFunctions()"
            [pageSize]="6"
            (selectionChanged)="onUserSelect($event)">
          </app-table-user-role>
        </div>
      </section>

    </div>

  </div>

  <!-- ── Action Bar ── -->
  <div class="action-bar">
    <div class="actions-primary">
      <dx-button text="Aggiungi" icon="add" type="default" stylingMode="contained" (onClick)="onAdd()"></dx-button>
      <dx-button text="Modifica" icon="edit" stylingMode="outlined" (onClick)="onEdit()"></dx-button>
      <dx-button text="Cancella" icon="trash" type="danger" stylingMode="outlined" (onClick)="onDelete()"></dx-button>
      <dx-button text="Traccia"  icon="chart" stylingMode="outlined" (onClick)="onTrace()"></dx-button>
    </div>
    <div class="actions-secondary">
      <dx-button text="Stampa Funzioni" icon="print" stylingMode="outlined" (onClick)="onPrintFunctions()"></dx-button>
      <dx-button text="Stampa Utenti"   icon="print" stylingMode="outlined" (onClick)="onPrintUsers()"></dx-button>
      <dx-button text="Reset" icon="refresh" stylingMode="outlined" (onClick)="onReset()"></dx-button>
    </div>
  </div>

</div>

<!-- ── Popup: Aggiungi Funzione ── -->
<dx-popup
  [visible]="showAddPopup()"
  [showTitle]="true"
  title="NUOVA FUNZIONE"
  [width]="440"
  [height]="'auto'"
  [wrapperAttr]="{ class: 'sempione-popup' }"
  (onHiding)="onCancelAdd()">
  <form [formGroup]="addForm" class="popup-form">

    <div class="form-row">
      <label class="form-lbl">Nome</label>
      <div class="form-fld">
        <dx-text-box formControlName="funName" [isValid]="!(addForm.get('funName')?.invalid && addForm.get('funName')?.touched)"></dx-text-box>
        @if (addForm.get('funName')?.invalid && addForm.get('funName')?.touched) {
          <span class="field-error">Nome funzione richiesto</span>
        }
      </div>
    </div>

    <div class="form-row">
      <label class="form-lbl">Host Code</label>
      <div class="form-fld">
        <dx-number-box formControlName="funHostcode" [isValid]="!(addForm.get('funHostcode')?.invalid && addForm.get('funHostcode')?.touched)"></dx-number-box>
        @if (addForm.get('funHostcode')?.invalid && addForm.get('funHostcode')?.touched) {
          <span class="field-error">Host code richiesto</span>
        }
      </div>
    </div>

    <div class="form-row">
      <span class="form-lbl"></span>
      <div class="form-fld">
        <dx-check-box formControlName="offline" text="Offline"></dx-check-box>
      </div>
    </div>

    <div class="form-row form-row--top">
      <label class="form-lbl">Descrizione</label>
      <div class="form-fld">
        <dx-text-area formControlName="funDescription" [height]="80"></dx-text-area>
      </div>
    </div>

    <div class="popup-actions">
      <dx-button text="Annulla" stylingMode="outlined" (onClick)="onCancelAdd()"></dx-button>
      <dx-button text="Salva" type="default" stylingMode="contained" [disabled]="isLoading()" (onClick)="onSaveAdd()"></dx-button>
    </div>

  </form>
</dx-popup>

<!-- ── Toast ── -->
<dx-toast
  [(visible)]="toastVisible"
  [type]="toastType()"
  [message]="toastMessage()"
  [displayTime]="3000">
</dx-toast>
