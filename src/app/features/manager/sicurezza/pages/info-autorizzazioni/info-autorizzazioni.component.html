<div class="page-shell">

  <section class="card-section">

    <div class="sempione-card-header">
      <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <h2 class="card-title">{{ 'infoAutorizzazioni.title' | transloco }}</h2>
      <span class="card-count">{{ userAuthorizations().length }}</span>
    </div>
    <div class="gold-divider"></div>

    <!-- Filter Toolbar -->
    <div class="card-toolbar">
      <div class="toolbar-inner">
        <div class="toolbar-search-wrap">
          <label class="toolbar-lbl">{{ 'infoAutorizzazioni.filterFunName' | transloco }}</label>
          <dx-text-box
            [value]="filterData().funlikeName ?? ''"
            (valueChange)="setFunlikeName($event)"
            placeholder="Filtra per nome...">
          </dx-text-box>
        </div>
        <div class="toolbar-search-wrap">
          <label class="toolbar-lbl">{{ 'infoAutorizzazioni.filterFunDes' | transloco }}</label>
          <dx-text-box
            [value]="filterData().funlikeDes ?? ''"
            (valueChange)="setFunlikeDes($event)"
            placeholder="Filtra per descrizione...">
          </dx-text-box>
        </div>
        <div class="toolbar-actions">
          <dx-button
            text="Cerca"
            icon="search"
            type="default"
            stylingMode="contained"
            class="btn-cerca"
            (onClick)="onSearch()">
          </dx-button>
          <dx-button
            [text]="'common.reset' | transloco"
            icon="revert"
            stylingMode="outlined"
            (onClick)="onClear()">
          </dx-button>
        </div>
      </div>
    </div>

    <!-- Data Grid -->
    <div class="card-body card-body--grid">
      <dx-data-grid
        [dataSource]="userAuthorizations()"
        [showBorders]="false"
        [columnAutoWidth]="true"
        [rowAlternationEnabled]="true"
        [hoverStateEnabled]="true"
        [allowColumnResizing]="true"
        columnResizingMode="nextColumn">

        <dxo-paging [pageSize]="16" [enabled]="true"></dxo-paging>
        <dxo-pager [showInfo]="true" [showPageSizeSelector]="false"></dxo-pager>

        <dxi-column dataField="funId"          [caption]="'infoAutorizzazioni.colFunId'          | transloco" [width]="80"  dataType="number" alignment="center"></dxi-column>
        <dxi-column dataField="funName"        [caption]="'infoAutorizzazioni.colFunName'         | transloco"></dxi-column>
        <dxi-column dataField="funDescription" [caption]="'infoAutorizzazioni.colFunDescription'  | transloco"></dxi-column>
        <dxi-column dataField="roleName"       [caption]="'infoAutorizzazioni.colRoleName'        | transloco" [width]="180"></dxi-column>
        <dxi-column dataField="accessLevel"    [caption]="'infoAutorizzazioni.colAccessLevel'     | transloco" [width]="160" alignment="center">
          <dxo-lookup [dataSource]="funcAccTyp()" valueExpr="fatId" displayExpr="fatDes"></dxo-lookup>
        </dxi-column>

      </dx-data-grid>
    </div>

  </section>

</div>
