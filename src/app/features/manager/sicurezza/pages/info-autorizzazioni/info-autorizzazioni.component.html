<div class="container">
  <h1>Info Autorizzazioni</h1>
  
  <!-- Filter Form -->
  <div class="filter-section mb-4">
    <dx-form [formData]="filterData()" [showColonAfterLabel]="false" labelLocation="top">
      <dxi-item itemType="group" [colCount]="4">
        <dxi-item dataField="usrId" editorType="dxTextBox">
          <dxo-label text="User ID"></dxo-label>
        </dxi-item>
        <dxi-item dataField="funlikeName" editorType="dxTextBox">
          <dxo-label text="Function Name"></dxo-label>
        </dxi-item>
        <dxi-item dataField="funlikeDes" editorType="dxTextBox">
          <dxo-label text="Function Description"></dxo-label>
        </dxi-item>
        <dxi-item dataField="tutti" editorType="dxCheckBox">
          <dxo-label text="All"></dxo-label>
        </dxi-item>
      </dxi-item>
    </dx-form>
    
    <div class="button-group d-flex gap-2 mt-3">
      <app-button-ricerca (onClick)="onSearch()"></app-button-ricerca>
      <dx-button text="Clear" icon="clearsquare" (onClick)="onClear()"></dx-button>
    </div>
  </div>

  <hr class="my-4">
  
  <!-- Data Grid -->
  <dx-data-grid
    [dataSource]="userAuthorizations()"
    [showBorders]="true"
    [columnAutoWidth]="true"
    [allowColumnReordering]="true"
    [allowColumnResizing]="true"
    columnResizingMode="nextColumn">
    <dxi-column dataField="funId" caption="Function ID" width="100" dataType="number"></dxi-column>
    <dxi-column dataField="funName" caption="Function Name"></dxi-column>
    <dxi-column dataField="funDescription" caption="Description"></dxi-column>
    <dxi-column dataField="funHostcode" caption="Host Code" width="100" dataType="number"></dxi-column>
    <dxi-column dataField="offline" caption="Offline" width="100" dataType="boolean"></dxi-column>
    <dxi-column dataField="roleName" caption="Role Name"></dxi-column>
    <dxi-column dataField="accessLevel" caption="Access Level" width="120" dataType="number"></dxi-column>
  </dx-data-grid>
</div>
