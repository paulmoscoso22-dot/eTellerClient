<div class="page-shell">

  <section class="card-section">

    <div class="sempione-card-header">
      <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
      <h2 class="card-title">Utenti Collegati</h2>
    </div>
    <div class="gold-divider"></div>

    <div class="card-body card-body--grid">
      <dx-data-grid
        [dataSource]="userUseClient$ | async"
        [showBorders]="false"
        [allowColumnResizing]="true"
        [columnAutoWidth]="true"
        [hoverStateEnabled]="true"
        [rowAlternationEnabled]="true"
        keyExpr="usrCliId"
        (onSelectionChanged)="onSelectionChanged($event)">

        <dxo-selection mode="single"></dxo-selection>
        <dxo-search-panel [visible]="true" placeholder="Cerca utente..." [width]="220"></dxo-search-panel>
        <dxo-paging [pageSize]="14"></dxo-paging>
        <dxo-pager [showPageSizeSelector]="false" [showInfo]="true"></dxo-pager>

        <dxi-column dataField="usrCliId" caption="ID"            [visible]="false"></dxi-column>
        <dxi-column dataField="cliId"    caption="Client ID"></dxi-column>
        <dxi-column dataField="usrId"    caption="User ID"></dxi-column>
        <dxi-column dataField="dataIn"   caption="Data Accesso"  dataType="datetime" format="dd/MM/yyyy HH:mm:ss"></dxi-column>
        <dxi-column dataField="dataOut"  caption="Data Uscita"   dataType="datetime" format="dd/MM/yyyy HH:mm:ss"></dxi-column>
        <dxi-column dataField="forced"   caption="Forzato"       dataType="boolean"  [width]="90"></dxi-column>

      </dx-data-grid>
    </div>

  </section>

  <div class="action-bar">
    <div class="actions-primary">
      <dx-button
        text="Forza Uscita"
        icon="remove"
        type="danger"
        stylingMode="contained"
        [disabled]="!selectedUsrCliId()"
        (onClick)="forzaUscita()">
      </dx-button>
    </div>
  </div>

</div>
