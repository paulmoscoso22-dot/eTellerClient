<div class="page-shell">

  <!-- ══ UPPER ROW: Gestione Ruoli + Utenti associati ══ -->
  <div class="upper-row">

    <!-- ── Left: Gestione Ruoli (Main Card) ── -->
    <section class="card-section">

      <app-header-card title="Gestione Ruoli" [count]="filteredRoles().length + ' / ' + roles().length">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
      </app-header-card>

      <!-- Integrated Toolbar -->
      <app-card-toolbar
        [searchValue]="searchRoles()"
        (searchValueChange)="searchRoles.set($event)"
        searchPlaceholder="Cerca per nome o descrizione...">
        <dx-button toolbar-actions
          text="+ Nuovo Ruolo"
          type="default"
          stylingMode="contained"
          class="btn-new"
          (onClick)="onAggiungi()">
        </dx-button>
        <dx-button toolbar-actions
          icon="print"
          hint="Stampa lista ruoli"
          stylingMode="outlined"
          class="btn-outline"
          (onClick)="onStampaLista()">
        </dx-button>
      </app-card-toolbar>

      <!-- Roles Grid -->
      <app-card-data-grid
        [dataSource]="filteredRoles()"
        keyExpr="roleId"
        [columns]="roleColumns"
        [pageSize]="8"
        [paginationEnabled]="true"
        (selectionChanged)="onRoleSelectionChanged($event)"
        (rowEdit)="onRowEdit($event)"
        (rowTrace)="onTraceRow($event)">
      </app-card-data-grid>

      <!-- Detail Form -->
      <div class="card-body card-body--form">
        <div class="form-row">
          <label class="form-lbl">Nome</label>
          <div class="form-fld">
            <dx-text-box
              [value]="selectedRoleName()"
              (valueChange)="selectedRoleName.set($event)">
            </dx-text-box>
          </div>
        </div>
        <div class="form-row">
          <label class="form-lbl">Descrizione</label>
          <div class="form-fld">
            <dx-text-box
              [value]="selectedRoleDes() ?? ''"
              (valueChange)="selectedRoleDes.set($event)">
            </dx-text-box>
          </div>
        </div>
      </div>

    </section>

    <!-- ── Right: Utenti associati ── -->
    <section class="card-section">

      <app-header-card title="Utenti associati" [count]="usersByRole().length">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
      </app-header-card>

      <app-card-toolbar
        [searchValue]="searchUsers()"
        (searchValueChange)="searchUsers.set($event)"
        searchPlaceholder="Cerca utente...">
      </app-card-toolbar>

      <app-card-data-grid
        [dataSource]="filteredUsersByRole()"
        keyExpr="usrId"
        [columns]="userColumns"
        [pageSize]="10"
        [paginationEnabled]="true"
        [showEditAction]="false"
        [showTraceAction]="false">
      </app-card-data-grid>

    </section>

  </div>

  <!-- ══ LOWER ROW: Funzioni per Ruolo ══ -->
  <div class="lower-row">
    <section class="card-section">

      <app-header-card title="Funzioni per Ruolo" [count]="functionsByRole().length">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6"  x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <line x1="3" y1="6"  x2="3.01" y2="6"></line>
          <line x1="3" y1="12" x2="3.01" y2="12"></line>
          <line x1="3" y1="18" x2="3.01" y2="18"></line>
        </svg>
      </app-header-card>

      <!-- Function search toolbar -->
      <app-card-toolbar [showSearch]="false">
        <div class="toolbar-filter-wrap">
          <label class="toolbar-lbl">Nome</label>
          <dx-text-box
            [value]="searchName() ?? ''"
            (valueChange)="searchName.set($event)"
            placeholder="Filtra per nome...">
          </dx-text-box>
        </div>
        <div class="toolbar-filter-wrap">
          <label class="toolbar-lbl">Descrizione</label>
          <dx-text-box
            [value]="searchDes() ?? ''"
            (valueChange)="searchDes.set($event)"
            placeholder="Filtra per descrizione...">
          </dx-text-box>
        </div>
        <dx-button toolbar-actions
          text="Cerca"
          icon="search"
          type="default"
          stylingMode="contained"
          class="btn-cerca"
          (onClick)="onCerca()">
        </dx-button>
      </app-card-toolbar>

      <!-- Functions Grid -->
      <div class="card-body card-body--grid">
        <dx-data-grid
          [dataSource]="functionsByRole()"
          keyExpr="funId"
          [selection]="{ mode: 'single' }"
          [showBorders]="false"
          [columnAutoWidth]="true"
          [rowAlternationEnabled]="true"
          [hoverStateEnabled]="true">

          <dxo-paging [pageSize]="8" [enabled]="true"></dxo-paging>
          <dxo-pager [showInfo]="true" [showPageSizeSelector]="false"></dxo-pager>

          <dxi-column dataField="funId"          caption="ID"              [width]="60"></dxi-column>
          <dxi-column dataField="funName"        caption="Nome Funzione"   [width]="260"></dxi-column>
          <dxi-column dataField="accessLevel"    caption="Livello Accesso" [width]="220" cellTemplate="accessCell">
            <div *dxTemplate="let cell of 'accessCell'">
              <dx-select-box
                [dataSource]="funcAccTyp()"
                valueExpr="fatId"
                displayExpr="fatDes"
                [value]="cell.value"
                [readOnly]="false">
              </dx-select-box>
            </div>
          </dxi-column>
          <dxi-column dataField="funDescription" caption="Descrizione"></dxi-column>

        </dx-data-grid>
      </div>

    </section>
  </div>

  <!-- ── Action Bar ── -->
  <div class="action-bar">
    <div class="actions-primary">
      <dx-button text="Aggiungi" icon="add"   type="default" stylingMode="contained" class="btn-new"  (onClick)="onAggiungi()"></dx-button>
      <dx-button text="Modifica" icon="edit"  stylingMode="outlined"                                  (onClick)="onModifica()"></dx-button>
      <dx-button text="Cancella" icon="trash" type="danger"  stylingMode="outlined"                   (onClick)="onCancella()"></dx-button>
      <dx-button text="Traccia"  icon="chart" stylingMode="outlined"                                  (onClick)="onTrace()"></dx-button>
    </div>
    <div class="actions-secondary">
      <dx-button text="Stampa Utenti" icon="print"   stylingMode="outlined" (onClick)="onStampaUtenti()"></dx-button>
      <dx-button text="Reset"         icon="refresh" stylingMode="outlined" (onClick)="onReset()"></dx-button>
    </div>
  </div>

</div>
