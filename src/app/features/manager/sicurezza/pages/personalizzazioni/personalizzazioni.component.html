<div class="page-shell">

  <section class="card-section">

    <div class="sempione-card-header">
      <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="4" y1="21" x2="4" y2="14"></line>
        <line x1="4" y1="10" x2="4" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12" y2="3"></line>
        <line x1="20" y1="21" x2="20" y2="16"></line>
        <line x1="20" y1="12" x2="20" y2="3"></line>
        <line x1="1" y1="14" x2="7" y2="14"></line>
        <line x1="9" y1="8" x2="15" y2="8"></line>
        <line x1="17" y1="16" x2="23" y2="16"></line>
      </svg>
      <h2 class="card-title">Personalizzazioni</h2>
      <span class="card-count">{{ personalisations().length }}</span>
    </div>
    <div class="gold-divider"></div>

    <!-- Data Grid -->
    <div class="card-body card-body--grid">
      <dx-data-grid
        [dataSource]="personalisations()"
        keyExpr="parId"
        [selection]="{ mode: 'single' }"
        [showBorders]="false"
        [columnAutoWidth]="true"
        [rowAlternationEnabled]="true"
        [hoverStateEnabled]="true"
        [allowColumnResizing]="true"
        (onSelectionChanged)="onSelectionChanged($event)">

        <dxo-search-panel [visible]="true" placeholder="Cerca..." [width]="200"></dxo-search-panel>
        <dxo-paging [pageSize]="14" [enabled]="true"></dxo-paging>
        <dxo-pager [showInfo]="true" [showPageSizeSelector]="false"></dxo-pager>

        <dxi-column dataField="parId"    caption="ID"          [width]="200"></dxi-column>
        <dxi-column dataField="parDes"   caption="Descrizione" [width]="400"></dxi-column>
        <dxi-column dataField="parValue" caption="Valore"></dxi-column>
      </dx-data-grid>
    </div>

    <!-- Edit Form -->
    <div class="card-body card-body--form">
      <form [formGroup]="form" (ngSubmit)="onSave()">
        <div class="form-row form-row--top">
          <label class="form-lbl">Descrizione</label>
          <div class="form-fld">
            <dx-text-area formControlName="parDes" placeholder="Inserisci descrizione" [height]="66"></dx-text-area>
          </div>
        </div>
        <div class="form-row">
          <label class="form-lbl">Valore</label>
          <div class="form-fld">
            <dx-text-box formControlName="parValue" placeholder="Inserisci valore"></dx-text-box>
          </div>
        </div>
      </form>
    </div>

  </section>

  <!-- Action Bar -->
  <div class="action-bar">
    <div class="actions-primary">
      <dx-button text="Salva" icon="save" type="default" stylingMode="contained" class="btn-new" (onClick)="onSave()"></dx-button>
    </div>
    <div class="actions-secondary">
      <dx-button text="Traccia" icon="chart" stylingMode="outlined" (onClick)="onTrace()"></dx-button>
    </div>
  </div>

</div>
