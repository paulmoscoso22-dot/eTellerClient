<div class="container">
  <h2 style="font-size: 28px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; margin-bottom: 20px; font-weight: 600;">
    Gestione Utenti
  </h2>
  <app-table-utenti
    [users$]="users$"
    (userSelected)="onSelectionChanged($event)">
  </app-table-utenti>

<div id="ContainerUtenti" style="display: flex; flex-wrap: wrap; gap: 20px; width: 100%;">
   <div id="form" style="flex: 1 1 400px;">
     <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <div class="dx-fieldset" style="display: grid; grid-template-columns: 1fr 1fr; column-gap: 20px;">
      <!-- Usr Id -->
      <div class="dx-field">
        <div class="dx-field-label">User ID</div>
        <div class="dx-field-value">
          <dx-text-box formControlName="usrId">
            <dx-validator>
              <dxi-validation-rule type="required" message="User ID is required"></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </div>

      <!-- Usr Status -->
      <div class="dx-field">
        <div class="dx-field-label">Status</div>
        <div class="dx-field-value">
          <dx-select-box
            formControlName="usrStatus"
            [dataSource]="statiEntita$ | async"
            displayExpr="steDes"
            valueExpr="steId">
            <dx-validator>
              <dxi-validation-rule type="required" message="Status is required"></dxi-validation-rule>
            </dx-validator>
          </dx-select-box>
        </div>
      </div>

      <!-- Usr Extref -->
      <div class="dx-field">
        <div class="dx-field-label">External Ref</div>
        <div class="dx-field-value">
          <dx-text-box formControlName="usrExtref"></dx-text-box>
        </div>
      </div>

      <!-- Usr Host Id -->
      <div class="dx-field">
        <div class="dx-field-label">Host ID</div>
        <div class="dx-field-value">
          <dx-text-box formControlName="usrHostId">
            <dx-validator>
              <dxi-validation-rule type="required" message="Host ID is required"></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </div>

      <!-- Usr Bra Id -->
      <div class="dx-field">
        <div class="dx-field-label">Branch ID</div>
        <div class="dx-field-value">
          <dx-select-box
            formControlName="usrBraId"
            [dataSource]="branches$ | async"
            displayExpr="braDes"
            valueExpr="braId">
            <dx-validator>
              <dxi-validation-rule type="required" message="Branch is required"></dxi-validation-rule>
            </dx-validator>
          </dx-select-box>
        </div>
      </div>

      <!-- Usr Lingua -->
      <div class="dx-field">
        <div class="dx-field-label">Language</div>
        <div class="dx-field-value">
          <dx-select-box
            formControlName="usrLingua"
            [dataSource]="languages$ | async"
            displayExpr="lanDes"
            valueExpr="lanId">
            <dx-validator>
              <dxi-validation-rule type="required" message="Language is required"></dxi-validation-rule>
            </dx-validator>
          </dx-select-box>
        </div>
      </div>

      <div id="Buttons" class="dx-field" style="grid-column: span 2; display: flex; justify-content: flex-end; gap: 10px;">
        <dx-button id="aggiungi" text="Aggiungi" type="default" [useSubmitBehavior]="true" [disabled]="!!selectedUserId()"></dx-button>
        <dx-button text="Modifica" type="default" (onClick)="onUpdate()" [disabled]="!selectedUserId()"></dx-button>
        <dx-button text="Traccia" type="default" (onClick)="onTrace()"></dx-button>
        <dx-button text="Reset Password" type="default" (onClick)="openResetPasswordPopup()" [disabled]="!selectedUserId()"></dx-button>
        <dx-button text="Clear" type="default" (onClick)="onClear()"></dx-button>
      </div>
    </div>
  </form>
  </div>
  <div id="ruoliAssegnai" style="flex: 1 1 250px;">
    <!-- <h3>Ruoli Assegnati</h3> -->
    <dx-data-grid 
      [dataSource]="assignedRoles()" 
      [showBorders]="true" 
      height="250"
      keyExpr="roleId"
      [(selectedRowKeys)]="selectedAssignedRoleKeys">
      <dxo-selection mode="single"></dxo-selection>
      <!-- <dxi-column dataField="roleId" caption="ID"></dxi-column> -->
      <dxi-column dataField="roleName" caption="Ruoli Assegnati"></dxi-column>
      <!-- <dxi-column dataField="roleDes" caption="Descrizione"></dxi-column> -->
    </dx-data-grid>
  </div>
  <div id="moveleftRight" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;">
    <dx-button text="<<" type="default" (onClick)="addRole()"></dx-button>
    <dx-button text=">>" type="default" (onClick)="removeRole()"></dx-button>
  </div>
  <div id="ruoliPossibili" style="flex: 1 1 250px;">
    <!-- <h3>Ruoli Possibili</h3> -->
    <dx-data-grid 
      [dataSource]="possibleRoles()" 
      [showBorders]="true" 
      height="250"
      keyExpr="roleId"
      [(selectedRowKeys)]="selectedPossibleRoleKeys">
      <dxo-selection mode="single"></dxo-selection>
      <!-- <dxi-column dataField="roleId" caption="ID"></dxi-column> -->
      <dxi-column dataField="roleName" caption="Ruoli Possibili"></dxi-column>
      <!-- <dxi-column dataField="roleDes" caption="Descrizione"></dxi-column> -->
    </dx-data-grid>
  </div>
 
  </div>
  <div id="otherButtons" style="display: flex; justify-content: flex-end; gap: 10px; width: 100%; margin-top: 20px;">
    
    <dx-button text="Stampa lista utenti" type="default"></dx-button>
    <dx-button text="Stampa dettaglio utente" type="default"></dx-button>
  </div>
</div>

<dx-popup
  [width]="400"
  [height]="250"
  [showTitle]="true"
  title="Reset Password"
  [dragEnabled]="false"
  [hideOnOutsideClick]="false"
  [(visible)]="isResetPasswordPopupVisible">
  <div *dxTemplate="let data of 'content'">
    <form [formGroup]="resetPasswordForm" (ngSubmit)="changePassword()">
      <div class="dx-fieldset">
        <div class="dx-field">
          <div class="dx-field-label">Password</div>
          <div class="dx-field-value">
            <dx-text-box formControlName="password" mode="password">
              <dx-validator>
                <dxi-validation-rule type="required" message="Password is required"></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </div>
        </div>
        <div class="dx-field">
          <div class="dx-field-label">Conferma la password</div>
          <div class="dx-field-value">
            <dx-text-box formControlName="confirmPassword" mode="password">
              <dx-validator>
                <dxi-validation-rule type="required" message="Conferma password is required"></dxi-validation-rule>
                <!-- Optional: add custom validation rule to match passwords -->
              </dx-validator>
            </dx-text-box>
          </div>
        </div>
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
        <dx-button text="Annulla" type="normal" (onClick)="cancelResetPassword()"></dx-button>
        <dx-button text="Cambia" type="default" [useSubmitBehavior]="true"></dx-button>
      </div>
    </form>
  </div>
</dx-popup>
