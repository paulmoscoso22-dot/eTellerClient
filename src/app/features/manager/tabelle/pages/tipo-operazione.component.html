<div class="page-shell">

  <!-- ── Main Card: Tipo Operazione ── -->
  <section class="card-section">

    <div class="sempione-card-header">
      <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
        <line x1="8" y1="21" x2="16" y2="21"></line>
        <line x1="12" y1="17" x2="12" y2="21"></line>
      </svg>
      <h2 class="card-title">Tipo Operazione</h2>
    </div>
    <div class="gold-divider"></div>

    <!-- Toolbar -->
    <div class="card-toolbar">
      <div class="toolbar-inner">

        <div class="toolbar-search-wrap">
          <svg class="toolbar-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <dx-text-box
            placeholder="Cerca per ID, descrizione o host code..."
            [showClearButton]="true"
            valueChangeEvent="input"
            class="toolbar-textbox"
            (onValueChanged)="onSearchChanged($event)">
          </dx-text-box>
        </div>

        <div class="toolbar-actions">
          <dx-button
            class="btn-new"
            text="Nuovo"
            type="default"
            stylingMode="contained"
            (onClick)="openNewPopup()">
          </dx-button>
        </div>

      </div>
    </div>

    <!-- Griglia -->
    <div class="card-body card-body--grid">
      <dx-data-grid
        [dataSource]="filteredOperazioni()"
        [showBorders]="false"
        [columnAutoWidth]="true"
        [rowAlternationEnabled]="true"
        [hoverStateEnabled]="true"
        [height]="'100%'"
        keyExpr="optId">

        <dxo-selection mode="single"></dxo-selection>
        <dxo-paging [pageSize]="20"></dxo-paging>
        <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[20, 50, 100]" [showInfo]="true"></dxo-pager>

        <dxi-column dataField="optId"       caption="ID"           [width]="110" alignment="left"></dxi-column>
        <dxi-column dataField="optDes"      caption="Descrizione"                alignment="left"></dxi-column>
        <dxi-column dataField="optHoscod"   caption="Host Code"    [width]="130" alignment="left"></dxi-column>
        <dxi-column dataField="optAptId"    caption="Applicazione" [width]="110" alignment="center"></dxi-column>
        <dxi-column dataField="optIscredit" caption="Segno"        [width]="90"  alignment="center" cellTemplate="segnoTemplate"></dxi-column>
        <dxi-column dataField="optPrtdv"    caption="Stampa fiche" [width]="110" alignment="center" [allowSorting]="false" cellTemplate="boolTemplate"></dxi-column>

        <dxi-column
          caption="Azioni"
          [width]="80"
          [allowSorting]="false"
          [allowFiltering]="false"
          alignment="center"
          cellTemplate="actionsTemplate">
        </dxi-column>

        <div *dxTemplate="let cell of 'segnoTemplate'" class="segno-cell">
          <span class="segno-pill"
            [class.segno-pill--pos]="cell.value === '1'"
            [class.segno-pill--neg]="cell.value === '-1'">
            {{ cell.value === '1' ? '+1' : cell.value }}
          </span>
        </div>

        <div *dxTemplate="let cell of 'boolTemplate'" class="bool-cell">
          @if (cell.value) {
            <span class="bool-pill bool-pill--yes">✓</span>
          } @else {
            <span class="bool-pill bool-pill--no">—</span>
          }
        </div>

        <!-- View + Edit only (no delete — legacy has no delete) -->
        <div *dxTemplate="let cell of 'actionsTemplate'" class="actions-cell">
          <button class="action-btn action-btn--view" title="Visualizza" (click)="onTableAction('view', cell.data)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
          <button class="action-btn action-btn--edit" title="Modifica" (click)="onTableAction('edit', cell.data)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
          </button>
        </div>

      </dx-data-grid>
    </div>

  </section>

</div>

<!-- ── Popup Dettaglio Tipo Operazione ── -->
<dx-popup
  [(visible)]="isDetailPopupVisible"
  [showTitle]="true"
  [title]="popupMode() === 'edit' ? 'Modifica Tipo Operazione — ' + selectedLabel()
         : popupMode() === 'view' ? 'Dettaglio Tipo Operazione — ' + selectedLabel()
         : 'Nuovo Tipo Operazione'"
  [dragEnabled]="true"
  [hideOnOutsideClick]="false"
  [showCloseButton]="true"
  [width]="'90%'"
  [maxWidth]="700"
  [height]="'auto'"
  [maxHeight]="'90vh'"
  (onHidden)="closePopup()">

  <div *dxTemplate="let data of 'content'">
    <form [formGroup]="operazioneForm"
          class="popup-layout"
          [class.popup-view-mode]="popupMode() === 'view'">

      <!-- ── Card 1: Identificazione ── -->
      <section class="popup-card">
        <h3 class="popup-card-title">Identificazione</h3>
        <div class="popup-fields-grid popup-fields-grid--2col">

          <div class="popup-field-group" [class.field-id-locked]="popupMode() !== 'new'">
            <label class="popup-field-label">Codice</label>
            <dx-text-box
              formControlName="optId"
              [readOnly]="popupMode() !== 'new'"
              placeholder="Max 5 caratteri">
              <dx-validator>
                <dxi-validation-rule type="required"></dxi-validation-rule>
                <dxi-validation-rule type="stringLength" [max]="5" message="Massimo 5 caratteri"></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </div>

          <div class="popup-field-group">
            <label class="popup-field-label">Applicazione</label>
            <dx-text-box
              formControlName="optAptId"
              [readOnly]="popupMode() === 'view'"
              placeholder="Max 5 caratteri">
              <dx-validator>
                <dxi-validation-rule type="required"></dxi-validation-rule>
                <dxi-validation-rule type="stringLength" [max]="5" message="Massimo 5 caratteri"></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </div>

          <div class="popup-field-group popup-col-span-2">
            <label class="popup-field-label">Descrizione</label>
            <dx-text-box
              formControlName="optDes"
              [readOnly]="popupMode() === 'view'"
              placeholder="Max 50 caratteri">
              <dx-validator>
                <dxi-validation-rule type="required"></dxi-validation-rule>
                <dxi-validation-rule type="stringLength" [max]="50" message="Massimo 50 caratteri"></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </div>

        </div>
      </section>

      <!-- ── Card 2: Configurazione ── -->
      <section class="popup-card">
        <h3 class="popup-card-title">Configurazione</h3>
        <div class="popup-fields-grid popup-fields-grid--2col">

          <div class="popup-field-group">
            <label class="popup-field-label">Host Code</label>
            <dx-text-box
              formControlName="optHoscod"
              [readOnly]="popupMode() === 'view'"
              placeholder="Max 25 caratteri">
              <dx-validator>
                <dxi-validation-rule type="required"></dxi-validation-rule>
                <dxi-validation-rule type="stringLength" [max]="25" message="Massimo 25 caratteri"></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </div>

          <div class="popup-field-group">
            <label class="popup-field-label">Segno Importo</label>
            <dx-select-box
              formControlName="optIscredit"
              [dataSource]="segnoOptions"
              displayExpr="des"
              valueExpr="id"
              [readOnly]="popupMode() === 'view'">
              <dx-validator>
                <dxi-validation-rule type="required"></dxi-validation-rule>
              </dx-validator>
            </dx-select-box>
          </div>

          <div class="popup-field-group">
            <label class="popup-field-label">Modello Fiche</label>
            <dx-text-box
              formControlName="optAdvId"
              [readOnly]="popupMode() === 'view'"
              placeholder="Max 50 caratteri">
            </dx-text-box>
          </div>

          <div class="popup-field-group popup-flag-group">
            <label class="popup-field-label">Stampa Fiche</label>
            <dx-check-box
              formControlName="optPrtdv"
              [readOnly]="popupMode() === 'view'">
            </dx-check-box>
          </div>

        </div>
      </section>

      <!-- ── Action Bar sticky ── -->
      <div class="popup-action-bar">

        <div class="popup-actions-secondary">
          @if (popupMode() !== 'new') {
            <dx-button
              class="btn-action-outline"
              text="Storico"
              icon="clock"
              stylingMode="outlined"
              (onClick)="onTrace()">
            </dx-button>
          }
        </div>

        <div class="popup-actions-primary">
          @if (popupMode() === 'view') {
            <dx-button
              class="btn-action-close"
              text="Chiudi"
              icon="close"
              (onClick)="closePopup()">
            </dx-button>
          }
          @if (popupMode() === 'new') {
            <dx-button
              class="btn-action-primary"
              text="Aggiungi"
              icon="plus"
              (onClick)="onSubmit()">
            </dx-button>
          }
          @if (popupMode() === 'edit') {
            <dx-button
              class="btn-action-primary"
              text="Salva"
              icon="save"
              (onClick)="onUpdate()">
            </dx-button>
          }
        </div>

      </div>

    </form>
  </div>
</dx-popup>
