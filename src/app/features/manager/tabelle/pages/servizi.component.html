<div class="page-shell">

  <!-- ── Main Card: Gestione Servizi ── -->
  <section class="card-section">

    <div class="sempione-card-header">
      <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M6.34 17.66a8 8 0 1 1 11.32 0"></path>
        <line x1="12" y1="22" x2="12" y2="17"></line>
      </svg>
      <h2 class="card-title">Gestione Servizi</h2>
    </div>
    <div class="gold-divider"></div>

    <!-- Toolbar -->
    <div class="card-toolbar">
      <div class="toolbar-inner">

        <div class="toolbar-search-wrap">
          <svg class="toolbar-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <dx-text-box
            placeholder="Cerca per ID o descrizione..."
            [showClearButton]="true"
            valueChangeEvent="input"
            class="toolbar-textbox"
            (onValueChanged)="onSearchChanged($event)">
          </dx-text-box>
        </div>

        <div class="toolbar-actions">
          <dx-button
            class="btn-new"
            text="Nuovo"
            type="default"
            stylingMode="contained"
            (onClick)="openNewPopup()">
          </dx-button>
        </div>

      </div>
    </div>

    <!-- Griglia servizi -->
    <div class="card-body card-body--grid">
      <dx-data-grid
        [dataSource]="filteredServizi()"
        [showBorders]="false"
        [columnAutoWidth]="true"
        [rowAlternationEnabled]="true"
        [hoverStateEnabled]="true"
        [height]="'100%'"
        keyExpr="serId">

        <dxo-selection mode="single"></dxo-selection>
        <dxo-paging [pageSize]="15"></dxo-paging>
        <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[15, 25, 50]" [showInfo]="true"></dxo-pager>

        <dxi-column dataField="serId"     caption="ID"                [width]="130" alignment="left"></dxi-column>
        <dxi-column dataField="serDes"    caption="Descrizione"                      alignment="left"></dxi-column>
        <dxi-column dataField="serRunning" caption="Running"  [width]="90"  alignment="center" [allowSorting]="false" [allowFiltering]="false" cellTemplate="boolTemplate"></dxi-column>
        <dxi-column dataField="serTrace"   caption="Traccia"  [width]="90"  alignment="center" [allowSorting]="false" [allowFiltering]="false" cellTemplate="boolTemplate"></dxi-column>
        <dxi-column dataField="serEmail"   caption="Email"    [width]="80"  alignment="center" [allowSorting]="false" [allowFiltering]="false" cellTemplate="boolTemplate"></dxi-column>
        <dxi-column dataField="serEnable"  caption="Abilitato"[width]="90"  alignment="center" [allowSorting]="false" [allowFiltering]="false" cellTemplate="boolTemplate"></dxi-column>
        <dxi-column dataField="serLastRun" caption="Ultima esecuzione" [width]="160" alignment="left"></dxi-column>

        <dxi-column
          caption="Azioni"
          [width]="110"
          [allowSorting]="false"
          [allowFiltering]="false"
          alignment="center"
          cellTemplate="actionsTemplate">
        </dxi-column>

        <div *dxTemplate="let cell of 'boolTemplate'" class="bool-cell">
          @if (cell.value) {
            <span class="bool-pill bool-pill--yes">✓</span>
          } @else {
            <span class="bool-pill bool-pill--no">—</span>
          }
        </div>

        <div *dxTemplate="let cell of 'actionsTemplate'" class="actions-cell">
          <button class="action-btn action-btn--view" title="Visualizza" (click)="onTableAction('view', cell.data)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
          <button class="action-btn action-btn--edit" title="Modifica" (click)="onTableAction('edit', cell.data)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
          </button>
          <button class="action-btn action-btn--delete" title="Elimina" (click)="onTableAction('delete', cell.data)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v6M14 11v6"></path>
              <path d="M9 6V4h6v2"></path>
            </svg>
          </button>
        </div>

      </dx-data-grid>
    </div>

  </section>

</div>

<!-- ── Popup Dettaglio Servizio ── -->
<dx-popup
  [(visible)]="isDetailPopupVisible"
  [showTitle]="true"
  [title]="popupMode() === 'edit' ? 'Modifica Servizio — ' + selectedSerId()
         : popupMode() === 'view' ? 'Dettaglio Servizio — ' + selectedSerId()
         : 'Nuovo Servizio'"
  [dragEnabled]="true"
  [hideOnOutsideClick]="false"
  [showCloseButton]="true"
  [width]="700"
  [height]="'auto'"
  [maxHeight]="'90vh'"
  (onHidden)="closePopup()">

  <div *dxTemplate="let data of 'content'">
    <form [formGroup]="serviziForm"
          class="popup-layout"
          [class.popup-view-mode]="popupMode() === 'view'">

      <!-- ── Card: Dati Servizio ── -->
      <section class="popup-card">
        <h3 class="popup-card-title">Dati Servizio</h3>

        <div class="popup-fields-grid popup-fields-grid--2col">
          <div class="popup-field-group" [class.field-id-locked]="popupMode() !== 'new'">
            <label class="popup-field-label">Codice</label>
            <dx-text-box
              formControlName="serId"
              [readOnly]="popupMode() !== 'new'">
              <dx-validator>
                <dxi-validation-rule type="required"></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </div>
        </div>

        <div class="popup-field-group popup-field-group--full">
          <label class="popup-field-label">Descrizione</label>
          <dx-text-area
            formControlName="serDes"
            [height]="80"
            [readOnly]="popupMode() === 'view'">
          </dx-text-area>
        </div>

        @if (popupMode() !== 'new') {
          <div class="popup-field-group popup-field-group--full">
            <label class="popup-field-label">Ultimo errore</label>
            <dx-text-area
              formControlName="serDeserr"
              [height]="56"
              [readOnly]="true">
            </dx-text-area>
          </div>
        }
      </section>

      <!-- ── Card: Configurazione ── -->
      <section class="popup-card">
        <h3 class="popup-card-title">Configurazione</h3>

        <div class="popup-fields-grid popup-fields-grid--2col">
          <div class="popup-field-group">
            <label class="popup-field-label">Email di sistema</label>
            <dx-text-box
              formControlName="serSyserrmail"
              [readOnly]="popupMode() === 'view'">
            </dx-text-box>
          </div>
          <div class="popup-field-group">
            <label class="popup-field-label">Email applicazione</label>
            <dx-text-box
              formControlName="serApperrmail"
              [readOnly]="popupMode() === 'view'">
            </dx-text-box>
          </div>
        </div>

        <div class="popup-flags-row">
          <div class="popup-flag-group">
            <label class="popup-field-label">Invio Email</label>
            <dx-check-box formControlName="serEmail" [readOnly]="popupMode() === 'view'"></dx-check-box>
          </div>
          <div class="popup-flag-group">
            <label class="popup-field-label">Abilitato</label>
            <dx-check-box formControlName="serEnable" [readOnly]="popupMode() === 'view'"></dx-check-box>
          </div>
          <div class="popup-flag-group">
            <label class="popup-field-label">Attiva Trace</label>
            <dx-check-box formControlName="serTrace" [readOnly]="popupMode() === 'view'"></dx-check-box>
          </div>
        </div>
      </section>

      <!-- ── Action Bar sticky ── -->
      <div class="popup-action-bar">
        <div class="popup-actions-secondary"></div>
        <div class="popup-actions-primary">
          @if (popupMode() === 'view') {
            <dx-button
              class="btn-action-close"
              text="Chiudi"
              icon="close"
              (onClick)="closePopup()">
            </dx-button>
          }
          @if (popupMode() === 'new') {
            <dx-button
              class="btn-action-primary"
              text="Aggiungi"
              icon="plus"
              (onClick)="onSubmit()">
            </dx-button>
          }
          @if (popupMode() === 'edit') {
            <dx-button
              class="btn-action-primary"
              text="Salva"
              icon="save"
              (onClick)="onUpdate()">
            </dx-button>
          }
        </div>
      </div>

    </form>
  </div>
</dx-popup>
