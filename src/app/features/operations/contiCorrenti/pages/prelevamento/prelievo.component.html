<div class="container">
  <div class="page-header d-flex justify-content-between align-items-center mb-3">
    <h1>CONTI CORRENTI</h1>
    <div class="operation-info">
      Operazione: <strong>{{ formData.operazione }}</strong>
    </div>
  </div>

  <dx-form [formData]="formData" [showColonAfterLabel]="false" labelLocation="top">
    <dxi-item itemType="simple">
      <app-label-secondary [label]="'CONTI CORRENTI'"></app-label-secondary>
    </dxi-item>

    <!-- CONTI CORRENTI Section -->
    <dxi-item itemType="group" cssClass="panel-group">
      <dxi-item itemType="group" [colCount]="2">
        <dxi-item itemType="simple" [colSpan]="1">
          <div style="display: flex; gap: 8px; align-items: flex-end;">
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 4px; font-weight: 500;">Nr conto</label>
              <dx-text-box [(value)]="formData.nrConto"></dx-text-box>
            </div>
            <dx-button icon="search" (onClick)="showRicercaConto(formData.nrConto)" style="width: 40px; height: 40px;"></dx-button>
          </div>
        </dxi-item>
        <dxi-item dataField="titolare" editorType="dxTextBox">
          <dxo-label text="Titolare"></dxo-label>
        </dxi-item>

        <dxi-item dataField="divisaConto" editorType="dxTextBox">
          <dxo-label text="Divisa conto"></dxo-label>
        </dxi-item>
        <dxi-item dataField="rubrica" editorType="dxTextBox">
          <dxo-label text="Rubrica"></dxo-label>
        </dxi-item>

        <dxi-item dataField="saldo" editorType="dxNumberBox" [editorOptions]="{ format: '#,##0.00' }">
          <dxo-label text="Saldo"></dxo-label>
        </dxi-item>
        <dxi-item dataField="stampaSaldo" editorType="dxCheckBox" cssClass="align-checkbox" [editorOptions]="{ text: 'Stampa saldo' }">
          <dxo-label text="&nbsp;"></dxo-label>
        </dxi-item>

        <dxi-item dataField="importoConto" editorType="dxNumberBox" [editorOptions]="{ format: '#,##0.00' }">
          <dxo-label text="Importo"></dxo-label>
        </dxi-item>
        <dxi-item dataField="controvaloreChfConto" editorType="dxNumberBox" [editorOptions]="{ format: '#,##0.00' }">
          <dxo-label text="Controvalore CHF"></dxo-label>
        </dxi-item>
      </dxi-item>
    </dxi-item>

    <dxi-item itemType="simple">
      <div class="separator mt-4 mb-2"><strong>BIGLIETTI BANCA</strong></div>
    </dxi-item>

    <!-- BIGLIETTI BANCA Section -->
    <dxi-item itemType="group" cssClass="panel-group">
      <dxi-item itemType="group" [colCount]="2">
        <dxi-item dataField="divisaBanca" editorType="dxSelectBox">
          <dxo-label text="Divisa"></dxo-label>
        </dxi-item>
        <dxi-item dataField="cambioCtv" editorType="dxNumberBox">
          <dxo-label text="Cambio CTV"></dxo-label>
        </dxi-item>

        <dxi-item dataField="importoBanca" editorType="dxNumberBox" [editorOptions]="{ format: '#,##0.00' }">
          <dxo-label text="Importo"></dxo-label>
        </dxi-item>
        <dxi-item dataField="controvaloreChfBanca" editorType="dxNumberBox" [editorOptions]="{ format: '#,##0.00' }">
          <dxo-label text="Controvalore CHF"></dxo-label>
        </dxi-item>

        <dxi-item dataField="cambio" editorType="dxNumberBox">
          <dxo-label text="Cambio"></dxo-label>
          <dxo-button-options icon="money" (onClick)="showCambio()"></dxo-button-options>
        </dxi-item>
        <dxi-item dataField="cambioSistema" editorType="dxNumberBox">
          <dxo-label text="Cambio sistema"></dxo-label>
        </dxi-item>

        <dxi-item dataField="aggio" editorType="dxNumberBox">
          <dxo-label text="Aggio % / Aggio importo"></dxo-label>
        </dxi-item>
        <dxi-item dataField="stampaAvviso" editorType="dxCheckBox" cssClass="align-checkbox" [editorOptions]="{ text: 'Stampa avviso' }">
          <dxo-label text="&nbsp;"></dxo-label>
        </dxi-item>
      </dxi-item>
    </dxi-item>

    <dxi-item itemType="simple">
      <div class="separator mt-4 mb-2"><strong>VIGILANZA</strong></div>
    </dxi-item>

    <!-- VIGILANZA Section -->
    <dxi-item itemType="group" cssClass="panel-group">
      <dxi-item itemType="group" [colCount]="2">
        <dxi-item dataField="forzaVigilanza" editorType="dxCheckBox" cssClass="align-checkbox" [editorOptions]="{ text: 'Forza Vigilanza' }">
          <dxo-label text="&nbsp;"></dxo-label>
        </dxi-item>
      </dxi-item>
    </dxi-item>

    <dxi-item itemType="simple">
      <div class="separator mt-4 mb-2"><strong>ANTI RECYCLING</strong></div>
    </dxi-item>

    <!-- ANTI RECYCLING Section -->
    <!-- <dxi-item itemType="group" cssClass="panel-group text-center">
      <p class="py-3 m-0 text-muted">CONTROLLO ANTI RICICLAGGIO (AML) <br> <small>[ Informazioni cliente / controlli ]</small></p>
      <dx-button text="Apri Pannello AML" (onClick)="showAppearer()"></dx-button>
    </dxi-item>

    <dxi-item itemType="simple">
      <div class="separator mt-4 mb-2"><strong>DESCRIZIONE OPERAZIONE</strong></div>
    </dxi-item> -->

    <!-- DESCRIZIONE OPERAZIONE Section -->
    <dxi-item itemType="group" cssClass="panel-group">
      <dxi-item itemType="group" [colCount]="2">
        <dxi-item dataField="dataValuta" editorType="dxDateBox" [editorOptions]="{ displayFormat: 'dd/MM/yyyy' }">
          <dxo-label text="Data valuta"></dxo-label>
        </dxi-item>
        <dxi-item dataField="dataOperazione" editorType="dxDateBox" [editorOptions]="{ displayFormat: 'dd/MM/yyyy' }">
          <dxo-label text="Data operazione"></dxo-label>
        </dxi-item>

        <dxi-item dataField="nomeCognome" editorType="dxTextBox" [colSpan]="2">
          <dxo-label text="Nome e Cognome"></dxo-label>
        </dxi-item>
      </dxi-item>

      <dxi-item dataField="testo" editorType="dxTextArea" [editorOptions]="{ height: 90 }">
        <dxo-label text="Testo"></dxo-label>
      </dxi-item>

      <dxi-item dataField="commentoInterno" editorType="dxTextArea" [editorOptions]="{ height: 90 }">
        <dxo-label text="Commento interno"></dxo-label>
      </dxi-item>
    </dxi-item>

  </dx-form>

  <hr class="my-4">

  <!-- AZIONI Section -->
  <div class="actions-group d-flex flex-wrap gap-2 justify-content-center">
    <dx-button text="Indietro" icon="arrowleft"></dx-button>
    <dx-button text="Annulla" icon="remove"></dx-button>
    <dx-button text="Modifica" icon="edit"></dx-button>
    <dx-button text="Carica" icon="upload"></dx-button>
    <dx-button text="Cancella Bef" icon="trash"></dx-button>
    <dx-button text="Conferma" type="success" icon="check"></dx-button>
    <dx-button text="Storna" icon="revert"></dx-button>
    <dx-button text="Stampa" icon="print"></dx-button>
    <dx-button text="Dettagli" icon="info"></dx-button>
    <dx-button text="Crea benefondo" icon="add"></dx-button>
    <dx-button text="Sospendi" icon="clock"></dx-button>
    <dx-button text="Traccia" icon="chart"></dx-button>
  </div>
</div>

<!-- ============================ RICERCA CONTO POPUP ==================================== -->
<dx-popup
  [width]="600"
  [height]="600"
  [showTitle]="true"
  title="RICERCA CONTO CLIENTE"
  [dragEnabled]="false"
  [hideOnOutsideClick]="true"
  [visible]="ricercaContoVisible()"
  (visibleChange)="ricercaContoVisible.set($event)"
>
  <div *dxTemplate="let data of 'content'">
    <app-ricerca-conto-table></app-ricerca-conto-table>
  </div>
</dx-popup>

<!-- ============================= CAMBIO / PRICES POPUP ================================= -->
<dx-popup
  [width]="600"
  [height]="400"
  [showTitle]="true"
  title="PANNELLO CALCOLO CAMBIO VALUTA"
  [dragEnabled]="false"
  [hideOnOutsideClick]="true"
  [visible]="cambioVisible()"
  (visibleChange)="cambioVisible.set($event)"
>
  <div *dxTemplate="let data of 'content'">
    <p>[ Tassi - Spread - Calcolo cambio ]</p>
  </div>
</dx-popup>

<!-- ============================= PANEL APPEARER POPUP ================================== -->
<dx-popup
  [width]="600"
  [height]="400"
  [showTitle]="true"
  title="PANNELLO INFORMATIVO SISTEMA"
  [dragEnabled]="false"
  [hideOnOutsideClick]="true"
  [visible]="appearerVisible()"
  (visibleChange)="appearerVisible.set($event)"
>
  <div *dxTemplate="let data of 'content'">
    <p>[ Messaggi / warning operazione / AML ]</p>
  </div>
</dx-popup>
