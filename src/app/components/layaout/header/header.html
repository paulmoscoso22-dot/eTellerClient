<div class="header">
  <i class="bi bi-list list-icon" (click)="onMenuIconClicked()"></i>
  <div class="logo-sep"></div>
  <app-logo></app-logo>
  <app-application-name></app-application-name>

  <div class="header-spacer"></div>

  <app-user-badge (clicked)="onUserBadgeClick()"></app-user-badge>

  <div class="logo-sep"></div>

  <!-- Status Indicator + Timestamp -->
  <div class="status-wrapper">
    <div
      id="status-indicator"
      class="status-indicator"
      [class.online]="isOnline()"
      [attr.aria-label]="statusAriaLabel"
      role="status">
      <i class="bi" [class.bi-check]="isOnline()" [class.bi-x]="!isOnline()"></i>
    </div>
    <span class="status-timestamp">{{ relativeTime() }}</span>
  </div>
  <dx-tooltip
    target="#status-indicator"
    showEvent="mouseenter"
    hideEvent="mouseleave"
    position="bottom">
    <div *dxTemplate="let d of 'content'" class="status-tooltip">
      <i class="bi" [class.bi-check-circle-fill]="isOnline()" [class.bi-x-circle-fill]="!isOnline()"></i>
      <div>
        <div class="status-tooltip-label">{{ isOnline() ? 'Operativo' : 'Errore — Sistema non raggiungibile' }}</div>
        <div class="status-tooltip-time">{{ absoluteTimestamp }}</div>
      </div>
    </div>
  </dx-tooltip>

  <div class="logo-sep"></div>

  <dx-drop-down-button
    class="lang-selector"
    [items]="languages"
    [text]="currentLang()"
    displayExpr="label"
    keyExpr="code"
    (onItemClick)="onLanguageSelect($event)"
    stylingMode="text"
    [showArrowIcon]="false"
    [width]="52">
  </dx-drop-down-button>

  <div class="logo-sep"></div>
  <i class="bi bi-box-arrow-right list-icon" routerLink="/login" title="Exit"></i>
</div>
